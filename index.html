<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Crowd Analyzing — AI-Powered Event Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="app"></div>
<div id="toast-container"></div>

<script>
// ============================================================
//  THEME
// ============================================================
(function() {
  var saved = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
})();

function toggleTheme() {
  var current = document.documentElement.getAttribute('data-theme') || 'dark';
  var next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  var btn = document.getElementById('theme-btn');
  if (btn) btn.textContent = next === 'dark' ? '🌙' : '☀️';
}
window.toggleTheme = toggleTheme;

// ============================================================
//  STATE
// ============================================================
var state = {
  user: null,
  view: 'home',
  params: {},
  notifFilter: 'all',
  catFilter: 'all',
  scannedSet: new Set(['TKT-011','TKT-012','TKT-013','TKT-014','TKT-015','TKT-016','TKT-017','TKT-018','TKT-019','TKT-020','TKT-021','TKT-022','TKT-023','TKT-024','TKT-025']),
  scanStats: { total: 15, valid: 10, invalid: 5 },
  loginRole: 'customer',
};

// ============================================================
//  MOCK DATA
// ============================================================
var EVENTS = [
  { id:1, name:'Summer Music Festival', cat:'Music', loc:'Central Park Arena', city:'New York', date:'Apr 15, 2026', time:'6:00 PM', endTime:'11:00 PM', cap:5000, tickets:3800, attend:2100, level:'medium', pct:42, desc:'An electrifying evening of live music across three stages featuring world-class artists.', peak:'8:00\u20139:30 PM', best:'6:00\u20137:30 PM', org:'Events Corp', alerts:2 },
  { id:2, name:'Tech Conference 2026', cat:'Technology', loc:'Convention Center', city:'San Francisco', date:'Apr 20, 2026', time:'9:00 AM', endTime:'6:00 PM', cap:1000, tickets:620, attend:280, level:'low', pct:28, desc:'The premier technology conference bringing together innovators, founders, and developers.', peak:'11:00 AM\u20131:00 PM', best:'9:00\u201310:30 AM', org:'TechWorld Inc', alerts:0 },
  { id:3, name:'Sports Championship', cat:'Sports', loc:'City Stadium', city:'Chicago', date:'Apr 25, 2026', time:'3:00 PM', endTime:'6:30 PM', cap:30000, tickets:29500, attend:27500, level:'high', pct:92, desc:'The championship final you have been waiting for \u2014 two top teams battle it out.', peak:'3:00\u20135:00 PM', best:'Arrive before 2:00 PM', org:'City Sports Authority', alerts:5 },
  { id:4, name:'Modern Art Exhibition', cat:'Art', loc:'Museum of Modern Art', city:'Los Angeles', date:'May 1, 2026', time:'10:00 AM', endTime:'8:00 PM', cap:800, tickets:420, attend:320, level:'low', pct:40, desc:'A curated exhibition presenting works from 50 emerging and established artists.', peak:'2:00\u20134:00 PM', best:'10:00 AM\u201312:00 PM', org:'Arts Council LA', alerts:0 },
  { id:5, name:'Food & Wine Festival', cat:'Food', loc:'Harbor District Park', city:'Miami', date:'May 10, 2026', time:'12:00 PM', endTime:'10:00 PM', cap:3000, tickets:2900, attend:2700, level:'high', pct:90, desc:'Celebrate culinary culture with top chefs and award-winning wines in a waterfront setting.', peak:'6:00\u20138:00 PM', best:'12:00\u20132:00 PM', org:'Culinary Events Ltd', alerts:3 },
  { id:6, name:'Comedy Night Spectacular', cat:'Entertainment', loc:'Grand Theater', city:'Las Vegas', date:'May 15, 2026', time:'8:00 PM', endTime:'11:00 PM', cap:600, tickets:480, attend:380, level:'medium', pct:63, desc:'An unforgettable night of laughs with the best stand-up comedians in the country.', peak:'9:00\u201310:00 PM', best:'8:00 PM (on time)', org:'LV Entertainment', alerts:1 },
];

var NOTIFS = [
  { id:1, type:'crowd', sev:'high', event:'Sports Championship', read:false, time:'2 min ago', msg:'Crowd density has reached 92% \u2014 approaching critical levels. Gate B is overloaded.' },
  { id:2, type:'crowd', sev:'high', event:'Food & Wine Festival', read:false, time:'15 min ago', msg:'Main food tent at 90% capacity. Guests are being directed to East Wing tent.' },
  { id:3, type:'update', sev:'info', event:'Tech Conference 2026', read:true, time:'1 hour ago', msg:'Keynote session moved from Hall A to Hall B due to increased registration numbers.' },
  { id:4, type:'emergency', sev:'critical', event:'Summer Music Festival', read:true, time:'3 hours ago', msg:'Emergency: Medical team requested at Zone C. Security personnel please respond immediately.' },
  { id:5, type:'update', sev:'info', event:'Modern Art Exhibition', read:true, time:'5 hours ago', msg:'Exhibition closing time extended from 8:00 PM to 9:00 PM today.' },
];

// ============================================================
//  CHART REGISTRY
// ============================================================
var chartReg = {};
function destroyAllCharts() {
  Object.keys(chartReg).forEach(function(k) { try { chartReg[k].destroy(); } catch(e){} delete chartReg[k]; });
}

// ============================================================
//  NAVIGATION
// ============================================================
function navigate(view, params) {
  params = params || {};
  state.view = view;
  state.params = params;
  render();
}
window.navigate = navigate;

// ============================================================
//  TOAST
// ============================================================
function showToast(msg, type) {
  type = type || 'success';
  var c = document.getElementById('toast-container');
  var t = document.createElement('div');
  t.className = 'toast toast-' + type;
  t.innerHTML = '<span>' + (type === 'success' ? '&#10003;' : '&#10005;') + '</span><span>' + msg + '</span>';
  c.appendChild(t);
  setTimeout(function() { t.style.animation = 'slideOut 0.3s ease forwards'; setTimeout(function() { t.remove(); }, 320); }, 3000);
}
window.showToast = showToast;

// ============================================================
//  HELPERS
// ============================================================
function levelBadge(level) {
  var map = { low: 'badge-low', medium: 'badge-medium', high: 'badge-high' };
  var labels = { low: 'Low', medium: 'Medium', high: 'High' };
  return '<span class="badge ' + (map[level] || 'badge-info') + '">\u25cf ' + (labels[level] || level) + '</span>';
}

function capBarColor(pct) {
  if (pct < 50) return '#22C55E';
  if (pct < 75) return '#F59E0B';
  return '#EF4444';
}

function notifIcon(type, sev) {
  if (type === 'emergency') return '\uD83D\uDEA8';
  if (type === 'crowd') return sev === 'high' ? '\u26A0\uFE0F' : '\uD83D\uDCCA';
  return '\u2139\uFE0F';
}

function notifColor(sev) {
  if (sev === 'critical') return '#EF4444';
  if (sev === 'high') return '#F59E0B';
  return '#60A5FA';
}

var LOGO = 'brand_assets/logo.png';

// ============================================================
//  TOP NAV
// ============================================================
function renderTopNav() {
  var user = state.user;
  var unread = NOTIFS.filter(function(n) { return !n.read; }).length;
  return '<nav class="top-nav">' +
    '<a class="nav-logo" href="#" onclick="navigate(\'home\');return false;"><img src="' + LOGO + '" alt="Crowd Analyzing" /></a>' +
    '<div style="flex:1;display:flex;align-items:center;gap:4px;">' +
      '<button class="nav-link ' + (state.view==='home'?'active':'') + '" onclick="navigate(\'home\')">Home</button>' +
      '<button class="nav-link" onclick="navigate(\'home\')">Events</button>' +
    '</div>' +
    '<div style="display:flex;align-items:center;gap:16px;">' +
      '<div style="position:relative;">' +
        '<input class="input-field" style="padding:8px 14px 8px 38px;width:220px;font-size:13px;" placeholder="Search events\u2026" />' +
        '<span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;">\uD83D\uDD0D</span>' +
      '</div>' +
      (user && user.role === 'customer' ?
        '<button class="nav-link" style="position:relative;font-size:18px;padding:4px 8px;" onclick="navigate(\'notifications\')" aria-label="Notifications">\uD83D\uDD14' +
        (unread > 0 ? '<span style="position:absolute;top:0;right:0;background:#E91666;color:#fff;font-family:\'Montserrat\',sans-serif;font-weight:700;font-size:10px;border-radius:10px;padding:1px 5px;min-width:18px;text-align:center;">' + unread + '</span>' : '') +
        '</button>' : '') +
      '<button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme" title="Toggle dark/light mode" id="theme-btn">' + (document.documentElement.getAttribute('data-theme') === 'light' ? '☀️' : '🌙') + '</button>' +
      (user ?
        '<div style="display:flex;align-items:center;gap:10px;">' +
          '<div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#E91666,#FFB400);display:flex;align-items:center;justify-content:center;font-family:\'Montserrat\',sans-serif;font-weight:700;font-size:14px;color:#fff;">' + user.name.charAt(0) + '</div>' +
          '<div><div style="font-family:\'Montserrat\',sans-serif;font-weight:700;font-size:13px;line-height:1.2;">' + user.name + '</div><div style="font-size:11px;color:var(--muted);text-transform:capitalize;">' + user.role + '</div></div>' +
          '<button class="btn-ghost" style="font-size:12px;padding:6px 12px;" onclick="state.user=null;navigate(\'home\')">Logout</button>' +
        '</div>' :
        '<button class="btn-primary" onclick="navigate(\'login\')">Login</button>') +
    '</div>' +
  '</nav>';
}

// ============================================================
//  SIDEBAR
// ============================================================
function renderSidebar(active) {
  var u = state.user;
  var items = [
    { id:'dashboard', icon:'\uD83D\uDCCA', label:'Dashboard' },
    { id:'my-events', icon:'\uD83C\uDFAA', label:'My Events' },
    { id:'create', icon:'\u2795', label:'Create Event' },
    { id:'notifications', icon:'\uD83D\uDD14', label:'Notifications' },
    { id:'reports', icon:'\uD83D\uDCC8', label:'Reports' },
  ];
  return '<aside class="sidebar">' +
    '<div class="sidebar-logo"><img src="' + LOGO + '" alt="Crowd Analyzing" /></div>' +
    items.map(function(it) {
      var dest = it.id === 'my-events' ? 'dashboard' : it.id;
      var isActive = active === it.id || (active === 'dashboard' && it.id === 'my-events' && false);
      return '<button class="sidebar-item ' + (active===it.id?'active':'') + '" onclick="navigate(\'' + dest + '\')">' +
        '<span style="font-size:16px;">' + it.icon + '</span>' +
        '<span>' + it.label + '</span>' +
      '</button>';
    }).join('') +
    '<div class="sidebar-footer">' +
      (u ?
        '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">' +
          '<div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#E91666,#FFB400);display:flex;align-items:center;justify-content:center;font-family:\'Montserrat\',sans-serif;font-weight:700;font-size:14px;color:#fff;flex-shrink:0;">' + u.name.charAt(0) + '</div>' +
          '<div style="min-width:0;"><div style="font-family:\'Montserrat\',sans-serif;font-weight:700;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + u.name + '</div><div style="font-size:11px;color:var(--muted);text-transform:capitalize;">' + u.role + '</div></div>' +
        '</div>' +
        '<button class="btn-ghost" style="width:100%;font-size:12px;" onclick="state.user=null;navigate(\'home\')">\uD83D\uDEAA Logout</button>'
        : '') +
    '</div>' +
  '</aside>';
}

// ============================================================
//  VIEW: HOME
// ============================================================
function renderHome() {
  var cats = ['All', 'Music', 'Technology', 'Sports', 'Art', 'Food'];
  var cat = state.catFilter || 'all';
  var filtered = cat === 'all' ? EVENTS : EVENTS.filter(function(e) { return e.cat.toLowerCase() === cat.toLowerCase(); });

  var cardHtml = filtered.map(function(ev) {
    return '<div class="card" style="transition:transform 0.25s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.2s ease;cursor:pointer;" onmouseenter="this.style.transform=\'translateY(-6px)\';this.style.boxShadow=\'0 16px 48px rgba(233,22,102,0.2),0 4px 12px rgba(0,0,0,0.4)\'" onmouseleave="this.style.transform=\'\';this.style.boxShadow=\'\'" onclick="navigate(\'detail\',{id:' + ev.id + '})">' +
      '<div style="position:relative;overflow:hidden;">' +
        '<img src="https://placehold.co/400x220/1e1a3a/3a3560?text=' + encodeURIComponent(ev.name) + '" alt="' + ev.name + '" style="width:100%;height:180px;object-fit:cover;display:block;" />' +
        '<div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(13,12,26,0.85) 0%,transparent 55%);"></div>' +
        '<div style="position:absolute;inset:0;background:linear-gradient(135deg,rgba(233,22,102,0.15),rgba(255,180,0,0.08));mix-blend-mode:multiply;"></div>' +
        '<span class="badge badge-cat" style="position:absolute;top:12px;left:12px;">' + ev.cat + '</span>' +
        '<div style="position:absolute;bottom:12px;right:12px;">' + levelBadge(ev.level) + '</div>' +
      '</div>' +
      '<div style="padding:18px 18px 20px;">' +
        '<h3 style="font-family:\'Montserrat\',sans-serif;font-weight:800;font-size:16px;margin-bottom:8px;line-height:1.3;">' + ev.name + '</h3>' +
        '<div style="display:flex;flex-direction:column;gap:5px;margin-bottom:14px;">' +
          '<span style="font-size:13px;color:var(--muted);">\uD83D\uDCCD ' + ev.loc + ', ' + ev.city + '</span>' +
          '<span style="font-size:13px;color:var(--muted);">\uD83D\uDCC5 ' + ev.date + ' \u00B7 ' + ev.time + '</span>' +
        '</div>' +
        '<div style="display:flex;align-items:center;justify-content:space-between;">' +
          '<div style="font-size:12px;color:var(--muted);"><span style="color:' + capBarColor(ev.pct) + ';font-weight:700;">' + ev.pct + '%</span> capacity</div>' +
          '<button class="btn-primary" style="font-size:12px;padding:8px 16px;" onclick="event.stopPropagation();navigate(\'detail\',{id:' + ev.id + '})">View Details</button>' +
        '</div>' +
        '<div class="cap-bar-outer" style="margin-top:10px;">' +
          '<div class="cap-bar-inner" style="width:' + ev.pct + '%;background:' + capBarColor(ev.pct) + ';"></div>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');

  return renderTopNav() +
  '<section class="hero-section noise">' +
    '<div class="grid-bg"></div>' +
    '<div style="position:relative;z-index:1;max-width:760px;margin:0 auto;text-align:center;">' +
      '<div class="badge badge-cat" style="margin-bottom:20px;font-size:12px;padding:5px 14px;">\u2728 AI-Powered Crowd Intelligence</div>' +
      '<h1 style="font-family:\'Montserrat\',sans-serif;font-weight:900;font-size:clamp(36px,6vw,64px);line-height:1.1;letter-spacing:-0.03em;margin-bottom:20px;">Discover Events<br/><span class="grad-text">Near You</span></h1>' +
      '<p style="color:var(--muted);font-size:18px;max-width:520px;margin:0 auto 36px;">Real-time crowd predictions and AI-powered insights to make every event experience unforgettable.</p>' +
      '<div style="display:flex;gap:12px;max-width:540px;margin:0 auto;position:relative;">' +
        '<input class="input-field" style="flex:1;font-size:15px;padding:14px 20px 14px 46px;" placeholder="Search events, artists, venues\u2026" />' +
        '<span style="position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:18px;">\uD83D\uDD0D</span>' +
        '<button class="btn-primary" style="padding:14px 24px;font-size:15px;">Search</button>' +
      '</div>' +
    '</div>' +
  '</section>' +
  '<section style="max-width:1200px;margin:0 auto;padding:48px 32px;">' +
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:16px;">' +
      '<h2 style="font-family:\'Montserrat\',sans-serif;font-weight:800;font-size:22px;">Upcoming Events</h2>' +
      '<div class="tab-bar" style="flex-wrap:wrap;">' +
        cats.map(function(c) {
          var isActive = (cat === c.toLowerCase()) || (cat === 'all' && c === 'All');
          return '<button class="tab-btn ' + (isActive?'active':'') + '" onclick="state.catFilter=\'' + c.toLowerCase() + '\';navigate(\'home\')">' + c + '</button>';
        }).join('') +
      '</div>' +
    '</div>' +
    '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:24px;">' +
      cardHtml +
    '</div>' +
  '</section>';
}

// ============================================================
//  VIEW: DETAIL
// ============================================================
function renderDetail() {
  var id = state.params.id;
  var ev = EVENTS.find(function(e) { return e.id === id; }) || EVENTS[0];
  var forecastHours = ['6PM','7PM','8PM','9PM','10PM','11PM'];
  var forecastData = [35, 55, ev.pct, Math.min(ev.pct + 12, 99), Math.max(ev.pct - 5, 0), Math.max(ev.pct - 20, 0)];

  var infoItems = [
    ['\uD83C\uDFE2 Organizer', ev.org],
    ['\uD83D\uDCCD Location', ev.loc + ', ' + ev.city],
    ['\uD83D\uDCC5 Date', ev.date],
    ['\u23F0 Time', ev.time + ' \u2013 ' + ev.endTime],
    ['\uD83C\uDFAB Capacity', ev.cap.toLocaleString() + ' attendees'],
    ['\uD83C\uDFAD Tickets Sold', ev.tickets.toLocaleString()],
  ];

  return renderTopNav() +
  '<div style="max-width:1160px;margin:0 auto;padding:32px;">' +
    '<button class="btn-ghost" style="margin-bottom:24px;" onclick="navigate(\'home\')">\u2190 Back to Events</button>' +
    '<div style="position:relative;border-radius:20px;overflow:hidden;margin-bottom:36px;">' +
      '<img src="https://placehold.co/1160x360/1e1a3a/3a3560?text=' + encodeURIComponent(ev.name) + '" alt="' + ev.name + '" style="width:100%;height:320px;object-fit:cover;display:block;" />' +
      '<div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(13,12,26,0.9) 0%,rgba(13,12,26,0.3) 60%,transparent 100%);"></div>' +
      '<div style="position:absolute;inset:0;background:linear-gradient(135deg,rgba(233,22,102,0.2),rgba(255,180,0,0.1));mix-blend-mode:multiply;"></div>' +
      '<div style="position:absolute;bottom:28px;left:32px;">' +
        '<span class="badge badge-cat" style="margin-bottom:10px;">' + ev.cat + '</span>' +
        '<h1 style="font-family:\'Montserrat\',sans-serif;font-weight:900;font-size:clamp(24px,4vw,42px);letter-spacing:-0.02em;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,0.5);">' + ev.name + '</h1>' +
      '</div>' +
    '</div>' +
    '<div style="display:grid;grid-template-columns:1fr 360px;gap:28px;align-items:start;">' +
      '<div>' +
        '<div class="card" style="padding:28px;margin-bottom:24px;">' +
          '<h2 style="font-family:\'Montserrat\',sans-serif;font-weight:800;font-size:18px;margin-bottom:18px;">Event Information</h2>' +
          '<p style="color:var(--muted);line-height:1.8;margin-bottom:24px;">' + ev.desc + '</p>' +
          '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">' +
            infoItems.map(function(item) {
              return '<div style="background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;padding:14px;">' +
                '<div style="font-size:12px;color:var(--muted);margin-bottom:4px;font-family:\'Montserrat\',sans-serif;font-weight:600;">' + item[0] + '</div>' +
                '<div style="font-weight:500;font-size:14px;">' + item[1] + '</div>' +
              '</div>';
            }).join('') +
          '</div>' +
        '</div>' +
        '<div class="card" style="padding:28px;">' +
          '<h2 style="font-family:\'Montserrat\',sans-serif;font-weight:800;font-size:18px;margin-bottom:6px;"><span class="grad-text">AI</span> Crowd Forecast</h2>' +
          '<p style="color:var(--muted);font-size:13px;margin-bottom:20px;">Machine learning predictions based on historical data and real-time signals.</p>' +
          '<div style="display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;">' +
            forecastHours.map(function(h, i) {
              var d = forecastData[i];
              var col = d < 50 ? '#22C55E' : d < 75 ? '#F59E0B' : '#EF4444';
              return '<div style="flex:1;min-width:60px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center;">' +
                '<div style="font-family:\'Montserrat\',sans-serif;font-weight:700;font-size:11px;color:var(--muted);margin-bottom:6px;">' + h + '</div>' +
                '<div style="font-family:\'Montserrat\',sans-serif;font-weight:800;font-size:16px;color:' + col + ';">' + d + '%</div>' +
                '<div style="height:3px;background:rgba(255,255,255,0.08);border-radius:2px;margin-top:8px;overflow:hidden;"><div style="height:100%;width:' + d + '%;background:' + col + ';border-radius:2px;"></div></div>' +
              '</div>';
            }).join('') +
          '</div>' +
          '<div style="background:rgba(255,180,0,0.08);border:1px solid rgba(255,180,0,0.2);border-radius:10px;padding:14px;display:flex;gap:12px;align-items:center;">' +
            '<span style="font-size:20px;">\uD83D\uDCA1</span>' +
            '<div><div style="font-family:\'Montserrat\',sans-serif;font-weight:700;font-size:13px;color:#FFB400;margin-bottom:2px;">Best Time to Visit</div><div style="font-size:13px;color:var(--muted);">' + ev.best + '</div></div>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div style="position:sticky;top:80px;">' +
        '<div class="card" style="padding:24px;">' +
          '<div style="text-align:center;margin-bottom:20px;">' +
            '<div style="font-size:12px;color:var(--muted);font-family:\'Montserrat\',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;">Current Crowd Level</div>' +
            levelBadge(ev.level) +

          '</div>' +
          '<div class="cap-bar-outer" style="height:10px;margin-bottom:20px;">' +

            '<div style="display:flex;justify-content:space-between;font-size:13px;"><span style="color:var(--muted);">\uD83C\uDFAB Tickets Available</span><span style="font-weight:500;">' + (ev.cap - ev.tickets).toLocaleString() + '</span></div>' +
            '<div style="display:flex;justify-content:space-between;font-size:13px;"><span style="color:var(--muted);">\u26A0\uFE0F Active Alerts</span><span style="font-weight:500;color:' + (ev.alerts > 0 ? '#EF4444' : '#22C55E') + ';">' + ev.alerts + '</span></div>' +
          '</div>' +

          '<div style="margin-top:16px;display:flex;align-items:center;justify-content:space-between;padding:12px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;">' +
            '<div><div style="font-family:\'Montserrat\',sans-serif;font-weight:700;font-size:13px;margin-bottom:2px;">Crowd Alerts</div><div style="font-size:12px;color:var(--muted);">Get notified of high density</div></div>' +
            '<label style="position:relative;display:inline-block;width:44px;height:24px;cursor:pointer;">' +
              '<input type="checkbox" id="notif-toggle" style="opacity:0;width:0;height:0;position:absolute;" onchange="toggleAlertSwitch(this)" />' +
              '<span id="toggle-track" style="position:absolute;inset:0;background:rgba(255,255,255,0.1);border-radius:12px;border:1px solid var(--border);transition:background 0.2s;"></span>' +
              '<span id="toggle-thumb" style="position:absolute;top:3px;left:3px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform 0.2s;box-shadow:0 1px 4px rgba(0,0,0,0.3);"></span>' +
            '</label>' +
          '</div>' +
        '</div>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function toggleAlertSwitch(el) {
  var track = document.getElementById('toggle-track');
  var thumb = document.getElementById('toggle-thumb');
  if (track) track.style.background = el.checked ? 'linear-gradient(135deg,#E91666,#FFB400)' : 'rgba(255,255,255,0.1)';
  if (thumb) thumb.style.transform = el.checked ? 'translateX(20px)' : 'translateX(0)';
  showToast(el.checked ? 'Subscribed to crowd alerts!' : 'Unsubscribed from alerts', el.checked ? 'success' : 'error');
}
window.toggleAlertSwitch = toggleAlertSwitch;

function renderNotifications() {
  var f = state.notifFilter || 'all';

  return renderTopNav() +

          return '<button class="tab-btn ' + (f===t[0]?'active':'') + '" onclick="state.notifFilter=\'' + t[0] + '\';navigate(\'notifications\')">' + t[1] + '</button>';
        }).join('') +
      '</div>' +
    '</div>' +
    '<div style="display:flex;flex-direction:column;gap:12px;">' +
      filtered.map(function(n) {

function initDashboardCharts() {
  Chart.defaults.color = 'rgba(180,175,220,0.6)';
  Chart.defaults.borderColor = 'rgba(255,255,255,0.07)';
  var hours = ['12PM','1PM','2PM','3PM','4PM','5PM','6PM','7PM','8PM','9PM','10PM','11PM'];
  var actual = [420,780,1150,1650,2100,2450,2800,3100,3350,3200,3050,2700];
  var forecast = [400,720,1100,1600,2050,2400,2750,3050,3280,3150,3000,2600];
  var ca = document.getElementById('chart-attend');
  if (ca) {
    chartReg['attend'] = new Chart(ca, {
      type: 'line',
      data: { labels: hours, datasets: [
        { label:'Actual', data:actual, borderColor:'#E91666', backgroundColor:'rgba(233,22,102,0.12)', tension:0.4, fill:true, pointRadius:3, pointBackgroundColor:'#E91666' },
        { label:'Forecast', data:forecast, borderColor:'#FFB400', backgroundColor:'rgba(255,180,0,0.07)', tension:0.4, fill:true, borderDash:[5,5], pointRadius:3, pointBackgroundColor:'#FFB400' }
      ]},
      options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'top', labels:{ font:{family:'Montserrat',size:11}, boxWidth:12, padding:14 }}}, scales:{ x:{ grid:{color:'rgba(255,255,255,0.05)'}, ticks:{font:{size:11}} }, y:{ grid:{color:'rgba(255,255,255,0.05)'}, ticks:{font:{size:11}} }}}
    });
  }
  var cf = document.getElementById('chart-forecast');
  if (cf) {

    chartReg['forecast'] = new Chart(cf, {

    });
  }
}

function renderEdit() {
  var id = state.params.id;

  function toTimeInput(t) {
    if (!t) return '';
    var m = t.match(/(\d+):(\d+)\s*(AM|PM)/i);
    if (!m) return '';
    var h = parseInt(m[1]); var min = m[2]; var ampm = m[3].toUpperCase();
    if (ampm === 'PM' && h !== 12) h += 12;
    if (ampm === 'AM' && h === 12) h = 0;
    return (h < 10 ? '0' : '') + h + ':' + min;
  }

  return '<div class="org-layout">' +
    renderSidebar('dashboard') +
    '<main class="org-main">' +
      '<div style="padding:32px;max-width:920px;">' +

          '<p style="font-size:14px;color:var(--muted);">Update the details for <strong>' + ev.name + '</strong></p>' +
        '</div>' +
        '<div class="card" style="padding:32px;">' +
          '<form onsubmit="doSaveEvent(event,' + ev.id + ')" id="edit-form">' +
            '<div class="form-section-title">Basic Information</div>' +
            '<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;">' +
              '<div style="grid-column:1/-1;"><label class="field-label">Event Name *</label><input type="text" class="input-field" required id="ef-name" value="' + ev.name + '" /></div>' +
              '<div><label class="field-label">Category *</label><select class="input-field" required id="ef-cat">' +
                ['Music','Technology','Sports','Art','Food','Entertainment'].map(function(c) { return '<option value="'+c+'" '+(ev.cat===c?'selected':'')+'>'+c+'</option>'; }).join('') +
              '</select></div>' +
              '<div><label class="field-label">Organizer</label><input type="text" class="input-field" id="ef-org" value="' + ev.org + '" /></div>' +
              '<div style="grid-column:1/-1;"><label class="field-label">Description *</label><textarea class="input-field" rows="4" required id="ef-desc" style="resize:vertical;">' + ev.desc + '</textarea></div>' +
            '</div>' +
            '<div class="section-divider"></div>' +
            '<div class="form-section-title">Location &amp; Date</div>' +
            '<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;">' +
              '<div><label class="field-label">Venue *</label><input type="text" class="input-field" required id="ef-loc" value="' + ev.loc + '" /></div>' +
              '<div><label class="field-label">City *</label><input type="text" class="input-field" required id="ef-city" value="' + ev.city + '" /></div>' +
              '<div><label class="field-label">Start Time</label><input type="time" class="input-field" id="ef-time" value="' + toTimeInput(ev.time) + '" /></div>' +
              '<div><label class="field-label">End Time</label><input type="time" class="input-field" id="ef-endtime" value="' + toTimeInput(ev.endTime) + '" /></div>' +
            '</div>' +
            '<div class="section-divider"></div>' +
            '<div class="form-section-title">Capacity &amp; Settings</div>' +
            '<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px;">' +
              '<div><label class="field-label">Total Capacity</label><input type="number" class="input-field" id="ef-cap" value="' + ev.cap + '" min="1" /></div>' +

        '</div>' +
      '</div>' +

function doSaveEvent(e, id) {
  e.preventDefault();
  var idx = EVENTS.findIndex(function(ev) { return ev.id === id; });

    EVENTS[idx].name = document.getElementById('ef-name').value;

function validateTicket() {
  var input = document.getElementById('ticket-input');
  if (!input) return;
  var code = input.value.trim().toUpperCase();
  var resultEl = document.getElementById('scan-result');
  if (!code) { showToast('Please enter a ticket code', 'error'); return; }

  var validPattern = /^TKT-0(0[1-9]|10)$/;
  var usedPattern = /^TKT-0(1[1-9]|2[0-5])$/;
  var html = '';

  if (validPattern.test(code) && !state.scannedSet.has(code)) {
    state.scanStats.total++;
    state.scanStats.valid++;
    state.scannedSet.add(code);
    html = '<div style="background:rgba(34,197,94,0.1);border:2px solid rgba(34,197,94,0.4);border-radius:14px;padding:20px;text-align:center;">' +
      '<div style="font-size:40px;margin-bottom:8px;">\u2705</div>' +
      '<div style="font-family:\'Montserrat\',sans-serif;font-weight:900;font-size:20px;color:#22C55E;margin-bottom:4px;">VALID TICKET</div>' +
      '<div style="font-family:\'Montserrat\',sans-serif;font-weight:700;font-size:14px;margin-bottom:12px;">' + code + ' \u2014 Entry Granted</div>' +
      '<div style="display:flex;justify-content:center;gap:24px;font-size:13px;color:var(--muted);">' +
        '<span>\uD83D\uDC64 Demo Attendee</span><span>\uD83D\uDCBA General Admission</span><span>\uD83D\uDD50 ' + new Date().toLocaleTimeString() + '</span>' +
      '</div>' +
    '</div>';
    showToast('Entry granted!', 'success');
  } else if (state.scannedSet.has(code) || usedPattern.test(code) || validPattern.test(code)) {
    state.scanStats.total++;
    html = '<div style="background:rgba(245,158,11,0.1);border:2px solid rgba(245,158,11,0.4);border-radius:14px;padding:20px;text-align:center;">' +
      '<div style="font-size:40px;margin-bottom:8px;">\u26A0\uFE0F</div>' +
      '<div style="font-family:\'Montserrat\',sans-serif;font-weight:900;font-size:20px;color:#F59E0B;margin-bottom:4px;">ALREADY USED</div>' +
      '<div style="font-family:\'Montserrat\',sans-serif;font-weight:700;font-size:14px;margin-bottom:8px;">' + code + '</div>' +
      '<div style="font-size:13px;color:var(--muted);">This ticket was previously scanned. Entry denied.</div>' +
    '</div>';
    showToast('Ticket already used!', 'error');
  } else {
    state.scanStats.total++;
    state.scanStats.invalid++;
    html = '<div style="background:rgba(239,68,68,0.1);border:2px solid rgba(239,68,68,0.4);border-radius:14px;padding:20px;text-align:center;">' +
      '<div style="font-size:40px;margin-bottom:8px;">\u274C</div>' +
      '<div style="font-family:\'Montserrat\',sans-serif;font-weight:900;font-size:20px;color:#EF4444;margin-bottom:4px;">INVALID TICKET</div>' +
      '<div style="font-family:\'Montserrat\',sans-serif;font-weight:700;font-size:14px;margin-bottom:8px;">' + code + '</div>' +
      '<div style="font-size:13px;color:var(--muted);">Ticket not found in the system. Please contact support.</div>' +
    '</div>';
    showToast('Invalid ticket code!', 'error');
  }

  if (resultEl) resultEl.innerHTML = html;

  // Update stats
  var statsEl = document.getElementById('scan-stats');
  if (statsEl) {
    var ss = state.scanStats;
    statsEl.innerHTML = [
      { label:'Total Scanned', val: ss.total, color: '#E91666' },
      { label:'Valid', val: ss.valid, color: '#22C55E' },
      { label:'Invalid', val: ss.invalid, color: '#EF4444' },
    ].map(function(s) {
      return '<div class="stat-card" style="text-align:center;padding:16px;">' +
        '<div style="font-family:\'Montserrat\',sans-serif;font-weight:900;font-size:28px;color:' + s.color + ';margin-bottom:4px;">' + s.val + '</div>' +
        '<div style="font-size:12px;color:var(--muted);font-family:\'Montserrat\',sans-serif;font-weight:600;">' + s.label + '</div>' +
      '</div>';
    }).join('');
  }

  input.value = '';
  input.focus();
}
window.validateTicket = validateTicket;

              ].map(function(row) {
                return '<tr>' +
                  '<td style="font-weight:500;">' + row[0] + '</td>' +
                  '<td style="font-family:\'Montserrat\',sans-serif;font-weight:700;">' + row[1] + '</td>' +
                  '<td style="color:var(--muted);font-size:13px;">' + row[2] + '</td>' +
                  '<td>' + (row[3]==='good' ? '<span class="badge badge-low">\u2713 Good</span>' : '<span class="badge badge-medium">\u26A0 Review</span>') + '</td>' +
                '</tr>';
              }).join('') +
            '</tbody>' +
          '</table>' +
        '</div>' +
      '</div>' +
    '</main>' +
  '</div>';
}

function initReportsCharts() {
  Chart.defaults.color = 'rgba(180,175,220,0.6)';
  Chart.defaults.borderColor = 'rgba(255,255,255,0.07)';
  var perfLabels = EVENTS.map(function(e) { return e.name.split(' ').slice(0,2).join(' '); });
  var tickets = [3800,620,29500,420,2900,480];
  var attendance = [2100,280,27500,320,2700,380];
  var cp = document.getElementById('chart-perf');
  if (cp) {
    chartReg['perf'] = new Chart(cp, {
      type:'bar',
      data:{ labels:perfLabels, datasets:[
        { label:'Tickets Sold', data:tickets, backgroundColor:'rgba(233,22,102,0.7)', borderColor:'#E91666', borderWidth:1, borderRadius:5 },
        { label:'Attendance', data:attendance, backgroundColor:'rgba(255,180,0,0.7)', borderColor:'#FFB400', borderWidth:1, borderRadius:5 }
      ]},
      options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'top',labels:{font:{family:'Montserrat',size:11},boxWidth:12,padding:14}}}, scales:{ x:{grid:{display:false},ticks:{font:{size:10},maxRotation:30}}, y:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{font:{size:11}}}}}
    });
  }
  var cd = document.getElementById('chart-density');
  if (cd) {
    chartReg['density'] = new Chart(cd, {
      type:'line',
      data:{ labels:['10AM','11AM','12PM','1PM','2PM','3PM','4PM','5PM','6PM','7PM'], datasets:[{ label:'Crowd Density %', data:[28,42,58,72,80,85,88,82,75,60], borderColor:'#E91666', backgroundColor:'rgba(233,22,102,0.1)', tension:0.4, fill:true, pointRadius:4, pointBackgroundColor:'#E91666', pointHoverRadius:6 }]},
      options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{ x:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{font:{size:11}}}, y:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{font:{size:11},callback:function(v){return v+'%'}},min:0,max:100}}}
    });
  }
}

// ============================================================
//  RENDER ROUTER
// ============================================================
function render() {
  destroyAllCharts();
  var app = document.getElementById('app');
  var v = state.view;

  if (v === 'home') {
    app.innerHTML = renderHome();
  } else if (v === 'detail') {
    app.innerHTML = renderDetail();
  } else if (v === 'login') {
    app.innerHTML = renderLogin();
  } else if (v === 'notifications') {
    app.innerHTML = renderNotifications();
  } else if (v === 'dashboard') {
    if (!state.user || state.user.role !== 'organizer') { navigate('login'); return; }
    app.innerHTML = renderDashboard();
    setTimeout(initDashboardCharts, 20);
  } else if (v === 'create') {
    if (!state.user || state.user.role !== 'organizer') { navigate('login'); return; }
    app.innerHTML = renderCreate();
  } else if (v === 'edit') {
    if (!state.user || state.user.role !== 'organizer') { navigate('login'); return; }
    app.innerHTML = renderEdit();
  } else if (v === 'scan') {
    if (!state.user) { navigate('login'); return; }
    app.innerHTML = renderScan();
  } else if (v === 'reports') {
    if (!state.user || state.user.role !== 'organizer') { navigate('login'); return; }
    app.innerHTML = renderReports();
    setTimeout(initReportsCharts, 20);
  } else {
    app.innerHTML = renderHome();
  }

  window.scrollTo(0, 0);
}

// Boot
render();
</script>
</body>
</html>
